<svg xmlns="http://www.w3.org/2000/svg" width="600" height="40" viewBox="0 0 600 40">
  <style>
    .dot { fill: #F7E018; }
    .ghost1 { fill: #FF0000; }
    .ghost2 { fill: #FFB8FF; }
    .ghost3 { fill: #00FFFF; }
    .ghost4 { fill: #FFB852; }
  </style>

  <!-- DOTS -->
  <circle class="dot" cx="200" cy="20" r="4">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.3;0.35;1" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle class="dot" cx="230" cy="20" r="4">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.25;0.3;1" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle class="dot" cx="260" cy="20" r="4">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.2;0.25;1" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle class="dot" cx="290" cy="20" r="4">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.15;0.2;1" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle class="dot" cx="320" cy="20" r="4">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.1;0.15;1" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle class="dot" cx="350" cy="20" r="6">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.05;0.1;1" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- PAC-MAN -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="-80,0;520,0;520,0" keyTimes="0;0.7;1" dur="6s" repeatCount="indefinite"/>
    <!-- Body -->
    <circle cx="0" cy="20" r="14" fill="#F7E018"/>
    <!-- Mouth animation -->
    <path fill="#0d1117">
      <animate attributeName="d"
        values="M0,20 L14,12 L14,28 Z;M0,20 L14,19 L14,21 Z;M0,20 L14,12 L14,28 Z"
        dur="0.4s" repeatCount="indefinite"/>
    </path>
    <!-- Eye -->
    <circle cx="-2" cy="12" r="2.5" fill="#0d1117"/>
  </g>

  <!-- GHOSTS (running away from pac-man after power pellet) -->
  <!-- Ghost 1 - Red (Blinky) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;600,0;600,0" keyTimes="0;0.7;1" dur="6s" repeatCount="indefinite"/>
    <!-- Ghost body -->
    <path class="ghost1" d="M370,8 Q370,4 374,4 L382,4 Q386,4 386,8 L386,30 L383,27 L380,30 L377,27 L374,30 L370,30 Z"/>
    <!-- Eyes -->
    <circle cx="375" cy="14" r="3" fill="white"/>
    <circle cx="381" cy="14" r="3" fill="white"/>
    <circle cx="374" cy="15" r="1.5" fill="#0d1117"/>
    <circle cx="380" cy="15" r="1.5" fill="#0d1117"/>
  </g>

  <!-- Ghost 2 - Pink (Pinky) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;620,0;620,0" keyTimes="0;0.7;1" dur="6s" repeatCount="indefinite"/>
    <path class="ghost2" d="M400,8 Q400,4 404,4 L412,4 Q416,4 416,8 L416,30 L413,27 L410,30 L407,27 L404,30 L400,30 Z"/>
    <circle cx="405" cy="14" r="3" fill="white"/>
    <circle cx="411" cy="14" r="3" fill="white"/>
    <circle cx="404" cy="15" r="1.5" fill="#0d1117"/>
    <circle cx="410" cy="15" r="1.5" fill="#0d1117"/>
  </g>

  <!-- Ghost 3 - Cyan (Inky) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;640,0;640,0" keyTimes="0;0.7;1" dur="6s" repeatCount="indefinite"/>
    <path class="ghost3" d="M430,8 Q430,4 434,4 L442,4 Q446,4 446,8 L446,30 L443,27 L440,30 L437,27 L434,30 L430,30 Z"/>
    <circle cx="435" cy="14" r="3" fill="white"/>
    <circle cx="441" cy="14" r="3" fill="white"/>
    <circle cx="434" cy="15" r="1.5" fill="#0d1117"/>
    <circle cx="440" cy="15" r="1.5" fill="#0d1117"/>
  </g>

  <!-- Ghost 4 - Orange (Clyde) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;660,0;660,0" keyTimes="0;0.7;1" dur="6s" repeatCount="indefinite"/>
    <path class="ghost4" d="M460,8 Q460,4 464,4 L472,4 Q476,4 476,8 L476,30 L473,27 L470,30 L467,27 L464,30 L460,30 Z"/>
    <circle cx="465" cy="14" r="3" fill="white"/>
    <circle cx="471" cy="14" r="3" fill="white"/>
    <circle cx="464" cy="15" r="1.5" fill="#0d1117"/>
    <circle cx="470" cy="15" r="1.5" fill="#0d1117"/>
  </g>
</svg>
