<svg xmlns="http://www.w3.org/2000/svg" width="650" height="210" viewBox="0 0 650 210">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P');
    text {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
    }
    .attr { fill: #FFFFFF; }
    .info { fill: #F7E018; font-size: 10px; }
  </style>

  <!-- Attributes appearing one by one and staying -->
  <text x="20" y="25" class="attr">
    Python
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.05;0.06;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <text x="20" y="50" class="attr">
    Analytics
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.12;0.13;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <text x="20" y="75" class="attr">
    GIS
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.19;0.20;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <text x="20" y="100" class="attr">
    SQL
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.26;0.27;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <text x="20" y="125" class="attr">
    PhD Student in Computer Science
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.33;0.34;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <text x="20" y="150" class="attr">
    PhD in Oceanography
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.40;0.41;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <text x="20" y="175" class="attr">
    Geographer
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.47;0.48;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <!-- "7 rows in set" appears last, then everything resets -->
  <text x="20" y="205" class="info">
    7 rows in set (0.00 sec)
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.55;0.56;0.90;0.91" dur="12s" repeatCount="indefinite"/>
  </text>
</svg>
