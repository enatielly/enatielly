<svg xmlns="http://www.w3.org/2000/svg" width="600" height="8" viewBox="0 0 600 8">
  <!-- Pac-Man moving divider -->
  <!-- Static dots -->
  <circle fill="#F7E018" cx="50" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="80" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="110" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="140" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="170" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="200" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="230" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="260" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="290" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="320" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="350" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="380" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="410" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="440" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="470" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="500" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="530" cy="4" r="2" opacity="0.3"/>
  <circle fill="#F7E018" cx="560" cy="4" r="2" opacity="0.3"/>

  <!-- Mini Pac-Man -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="-20,0;600,0" dur="4s" repeatCount="indefinite"/>
    <circle cx="0" cy="4" r="4" fill="#F7E018"/>
    <path fill="#0d1117">
      <animate attributeName="d" values="M0,4 L4,2 L4,6 Z;M0,4 L4,3.5 L4,4.5 Z;M0,4 L4,2 L4,6 Z" dur="0.3s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
